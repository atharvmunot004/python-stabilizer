site_name: stabilizer-python
site_url: https://atharvmunot004.github.io/python-stabilizer/
repo_url: https://github.com/atharvmunot004/python-stabilizer
repo_name: atharvmunot004/python-stabilizer
site_description: >-
  Minimal stabilizer (Clifford) simulator in pure Python —
  tableau-based state representation, QEC code examples, and a learning resource
  for anyone wanting to understand stabilizer simulation from first principles.

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - tables

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
    - Overview: getting-started/index.md
    - Installation: getting-started/installation.md
    - Your First Tableau State: getting-started/first-tableau.md
    - Building Circuits: getting-started/circuits.md
    - Inspecting Tableaux: getting-started/inspection.md
    - Measuring Qubits: getting-started/measurement.md
    - Hybrid Simulation: getting-started/non-clifford.md
    - Qiskit Interop: getting-started/qiskit.md
    - How from_qiskit Works: qiskit-interop.md
    - QEC Examples: getting-started/qec.md
    - Tracing Syndrome Extraction: getting-started/tracing.md
    - Running Tests: getting-started/tests.md
  - Architecture: architecture.md
  - Theory:
    - Stabilizer Formalism: theory/stabilizer-formalism.md
    - The Tableau: theory/tableau.md
    - Measurement: theory/measurement.md
    - Error-Correcting Codes: theory/qec-codes.md
    - Hybrid Simulation: hybrid-simulation.md
  - API Reference: api-reference.md
  - References: references.md
